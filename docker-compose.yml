version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: threshold-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: threshold_archive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: threshold-backend
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/threshold_archive?schema=public"
      PORT: 3001
      JWT_SECRET: "threshold-archive-secret-key-2026"
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/index.js"

volumes:
  postgres_data:
